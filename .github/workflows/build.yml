name: Build Custom Keymap

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container: qmkfm/qmk_cli

    steps:
      - name: Checkout Keymap Code
        uses: actions/checkout@v4
        with:
          path: my_keymap # Puts your files in a subfolder

      - name: Clone QMK Firmware
        run: |
          git clone --depth 1 --branch master https://github.com/qmk/qmk_firmware.git qmk_firmware
          cd qmk_firmware
          qmk setup -y

      - name: Inject Keymap and Build
        run: |
          # 1. Create the destination directory inside the QMK tree
          # Replace <keyboard_path> with your keyboard (e.g., gmmk/pro)
          DEST="qmk_firmware/keyboards/<keyboard_path>/keymaps/custom_build"
          mkdir -p "$DEST"
          
          # 2. Copy your files from your repo into that folder
          cp -R my_keymap/* "$DEST/"
          
          # 3. Compile
          cd qmk_firmware
          qmk compile -kb <keyboard_path> -km custom_build

      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: keyboard-firmware
          path: |
            qmk_firmware/*.hex
            qmk_firmware/*.bin
            qmk_firmware/*.uf2
