name: Build Hackpad Firmware

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build firmware using QMK Docker image
        run: |
          docker run --rm -v ${{ github.workspace }}:/qmk qmkfm/qmk_cli \
            qmk compile -kb hackpad -km default

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: hackpad-firmware
          path: "*.uf2"
